name: Daily Prediction Evaluation

on:
  schedule:
    - cron: "10 23 * * 0-4"  # 月〜金 8:10 JST（UTC 23:10）
  workflow_dispatch:           # GitHub UI から手動実行も可能

permissions:
  contents: write

concurrency:
  group: predictions-csv
  cancel-in-progress: false

jobs:
  evaluation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO_EMAIL: ${{ secrets.NOTIFY_TO_EMAIL }}
        run: python evaluate.py

      - name: Commit predictions.csv changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.csv
          git diff --cached --quiet || git commit -m "Update predictions.csv [skip ci]"
          git pull --rebase origin main
          for i in 1 2 3; do git push && break || sleep 5; done
